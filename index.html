<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>かけ算くく マスター</title>
<style>
/* ===== リセット & ベース ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow-x: hidden;
  background: #fff8f0;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Kaku Gothic ProN', 'BIZ UDPGothic', sans-serif;
  color: #333;
  -webkit-tap-highlight-color: transparent;
}
/* ===== 画面共通 ===== */
.screen {
  display: none;
  min-height: 100vh;
  padding: 0 0 40px;
  animation: fadeIn .25s ease;
}
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ===== トップ画面 ===== */
#screen-home {
  background: linear-gradient(160deg, #fff0f5 0%, #fff8e1 60%, #e8f5e9 100%);
}
.home-header {
  text-align: center;
  padding: 28px 20px 12px;
}
.home-title {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #f06292, #ff8a65, #ffd54f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  line-height: 1.2;
  animation: titlePulse 3s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}
.home-subtitle {
  font-size: .85rem;
  color: #f06292;
  margin-top: 4px;
  font-weight: 700;
}

/* トロフィーエリア */
.trophy-area {
  margin: 14px 16px;
  background: #fff;
  border-radius: 20px;
  padding: 18px 16px;
  box-shadow: 0 4px 18px rgba(240,98,146,.15);
  text-align: center;
}
.trophy-icon {
  font-size: 3.2rem;
  line-height: 1;
  animation: trophySpin 4s ease-in-out infinite;
}
@keyframes trophySpin {
  0%,100% { transform: rotate(-5deg) scale(1); }
  50% { transform: rotate(5deg) scale(1.08); }
}
.trophy-name {
  font-size: 1.2rem;
  font-weight: 900;
  color: #f06292;
  margin-top: 6px;
}
.trophy-msg {
  font-size: .85rem;
  color: #888;
  margin: 4px 0 10px;
}
.trophy-stars-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.trophy-star-count {
  font-size: 1.4rem;
  font-weight: 900;
  color: #ffc107;
}
.trophy-star-max {
  font-size: .9rem;
  color: #aaa;
  font-weight: 700;
}
.stars-progress {
  flex: 1;
  max-width: 120px;
  height: 10px;
  background: #f0e6ff;
  border-radius: 10px;
  overflow: hidden;
}
.stars-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ffd54f, #ffc107);
  border-radius: 10px;
  transition: width .6s ease;
}

/* 九九カードグリッド */
.dan-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 8px 14px 14px;
}
.dan-card {
  background: #fff;
  border-radius: 16px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: 0 3px 12px rgba(0,0,0,.08);
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  border: 3px solid transparent;
  position: relative;
  overflow: hidden;
}
.dan-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: var(--card-color, #f06292);
  border-radius: 14px 14px 0 0;
}
.dan-card:active { transform: scale(.94); box-shadow: 0 1px 6px rgba(0,0,0,.1); }
.dan-card-number {
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--card-color, #f06292);
  line-height: 1;
}
.dan-card-label {
  font-size: .7rem;
  color: #999;
  margin-bottom: 5px;
  font-weight: 700;
}
.dan-card-stars {
  font-size: 1rem;
  letter-spacing: 1px;
  margin: 4px 0;
  min-height: 22px;
}
.dan-card-progress {
  font-size: .65rem;
  color: #888;
  font-weight: 600;
  min-height: 16px;
}

/* フッター */
.home-footer {
  padding: 10px 20px 20px;
  text-align: center;
}
.btn-reset {
  background: #fff;
  color: #e57373;
  border: 2px solid #e57373;
  border-radius: 30px;
  padding: 10px 28px;
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .2s, color .2s;
}
.btn-reset:active { background: #e57373; color: #fff; }

/* ===== 学習画面 ===== */
#screen-study {
  background: linear-gradient(160deg, #e8f5e9 0%, #f3e5f5 100%);
}
.study-header {
  display: flex;
  align-items: center;
  padding: 16px 16px 8px;
  gap: 10px;
}
.btn-back {
  background: #fff;
  border: 2px solid #ddd;
  border-radius: 50%;
  width: 42px; height: 42px;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.btn-back:active { background: #f5f5f5; }
.study-title-area {
  flex: 1;
}
.study-dan-title {
  font-size: 1.5rem;
  font-weight: 900;
  color: #7b1fa2;
}
.study-stars-display {
  font-size: 1rem;
  color: #ffc107;
}

/* レベル選択 */
.level-select-area {
  padding: 8px 14px 16px;
}
.level-select-title {
  font-size: .9rem;
  font-weight: 700;
  color: #888;
  margin-bottom: 10px;
  text-align: center;
}
.level-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.level-item {
  background: #fff;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
  cursor: pointer;
  transition: transform .12s, box-shadow .12s;
  border: 3px solid transparent;
}
.level-item.cleared { border-color: #a5d6a7; }
.level-item.available { border-color: #90caf9; }
.level-item.locked { opacity: .5; cursor: default; background: #f5f5f5; }
.level-item:not(.locked):active { transform: scale(.97); }
.level-badge {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  font-weight: 900;
  flex-shrink: 0;
  background: #e3f2fd;
  color: #1565c0;
}
.level-item.cleared .level-badge { background: #e8f5e9; color: #2e7d32; }
.level-item.locked .level-badge { background: #eeeeee; color: #aaa; }
.level-info { flex: 1; }
.level-name {
  font-size: 1rem;
  font-weight: 900;
  color: #333;
}
.level-desc {
  font-size: .75rem;
  color: #888;
  margin-top: 2px;
}
.level-status {
  font-size: .8rem;
  font-weight: 700;
}
.level-item.cleared .level-status { color: #43a047; }
.level-item.available .level-status { color: #1e88e5; }
.level-item.locked .level-status { color: #bbb; }

/* 学習ゲーム部分 */
.game-area {
  padding: 8px 14px 16px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: .85rem;
  font-weight: 700;
  color: #666;
}
.progress-bar {
  width: 100%;
  height: 12px;
  background: #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 14px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #64b5f6, #7986cb);
  border-radius: 10px;
  transition: width .4s ease;
}
.question-card {
  background: #fff;
  border-radius: 20px;
  padding: 24px 20px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
  margin-bottom: 14px;
}
.question-formula {
  font-size: 2.4rem;
  font-weight: 900;
  color: #333;
  letter-spacing: 4px;
  line-height: 1.2;
}
.question-reading {
  font-size: .9rem;
  color: #9c27b0;
  font-weight: 700;
  margin-top: 8px;
  min-height: 22px;
}
.status-msg {
  font-size: 1rem;
  font-weight: 700;
  color: #555;
  text-align: center;
  margin: 10px 0;
  min-height: 28px;
}
.recognition-result {
  background: #f3f4f6;
  border-radius: 12px;
  padding: 10px 16px;
  font-size: 1.1rem;
  font-weight: 700;
  text-align: center;
  min-height: 44px;
  color: #333;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.recognition-result.correct { background: #e8f5e9; color: #2e7d32; }
.recognition-result.wrong { background: #ffebee; color: #c62828; }
.judge-icon {
  font-size: 2rem;
  text-align: center;
  margin: 6px 0;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* ボタン群 */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}
.btn-primary {
  background: linear-gradient(135deg, #66bb6a, #43a047);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 16px;
  font-size: 1.1rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(67,160,71,.35);
  transition: transform .12s, box-shadow .12s;
}
.btn-primary:active { transform: scale(.96); box-shadow: 0 2px 8px rgba(67,160,71,.3); }
.btn-secondary {
  background: linear-gradient(135deg, #42a5f5, #1e88e5);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 14px;
  font-size: 1rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(30,136,229,.3);
  transition: transform .12s;
}
.btn-secondary:active { transform: scale(.96); }
.btn-tertiary {
  background: #fff;
  color: #888;
  border: 2px solid #ddd;
  border-radius: 30px;
  padding: 12px;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
}
.btn-tertiary:active { background: #f5f5f5; }

/* 代替モード選択ボタン */
.alt-choices {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 10px 0;
}
.btn-choice {
  background: #fff;
  border: 3px solid #90caf9;
  border-radius: 16px;
  padding: 14px 6px;
  font-size: 1.2rem;
  font-weight: 900;
  cursor: pointer;
  color: #1565c0;
  transition: background .12s, transform .12s;
}
.btn-choice:active { background: #e3f2fd; transform: scale(.94); }
.btn-choice.correct-choice { background: #e8f5e9; border-color: #66bb6a; color: #2e7d32; }
.btn-choice.wrong-choice { background: #ffebee; border-color: #ef9a9a; color: #c62828; }

/* レベル結果表示 */
.result-area {
  background: #fff;
  border-radius: 20px;
  padding: 24px 20px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
  margin: 8px 14px;
}
.result-emoji {
  font-size: 3.5rem;
  animation: resultPop .5s cubic-bezier(.36,.07,.19,.97);
}
@keyframes resultPop {
  0% { transform: scale(0); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.result-title {
  font-size: 1.6rem;
  font-weight: 900;
  margin: 8px 0;
}
.result-title.success { color: #2e7d32; }
.result-title.fail { color: #c62828; }
.result-score {
  font-size: 1.1rem;
  color: #666;
  margin: 6px 0 14px;
}
.result-msg {
  font-size: .9rem;
  color: #888;
  margin-bottom: 16px;
  line-height: 1.6;
}
.result-stars {
  font-size: 1.8rem;
  letter-spacing: 4px;
  margin: 10px 0;
}

/* 認識中アニメーション */
.rec-animation {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}
.rec-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #f06292;
  animation: recBounce 1s ease-in-out infinite;
}
.rec-dot:nth-child(2) { animation-delay: .15s; }
.rec-dot:nth-child(3) { animation-delay: .3s; }
@keyframes recBounce {
  0%,80%,100% { transform: scale(.7); opacity: .6; }
  40% { transform: scale(1.2); opacity: 1; }
}

/* レベル選択エリア内に戻るボタン */
.level-back-row {
  display: flex;
  align-items: center;
  padding: 12px 14px 0;
}
.study-level-title {
  font-size: 1rem;
  font-weight: 700;
  color: #7b1fa2;
  margin-left: 8px;
}

/* 非対応アラート */
.no-speech-banner {
  background: #fff3e0;
  border: 2px solid #ffb74d;
  border-radius: 12px;
  padding: 12px 14px;
  font-size: .8rem;
  color: #e65100;
  font-weight: 700;
  margin-bottom: 12px;
  text-align: center;
}

/* スター増加アニメーション */
@keyframes starPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.5); }
  100% { transform: scale(1); }
}
.star-pop { animation: starPop .5s ease; }

/* ポップ演出オーバーレイ */
.pop-overlay {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(255,255,255,.95);
  border-radius: 24px;
  padding: 30px 40px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,.2);
  z-index: 1000;
  transition: transform .3s cubic-bezier(.36,.07,.19,.97), opacity .3s;
  pointer-events: none;
  opacity: 0;
}
.pop-overlay.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
  pointer-events: auto;
}
.pop-overlay-emoji { font-size: 3rem; }
.pop-overlay-text { font-size: 1.2rem; font-weight: 900; color: #333; margin-top: 8px; }
</style>
</head>
<body>

<!-- ===== トップ画面 ===== -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-title">かけ算くく マスター</div>
    <div class="home-subtitle">⭐ くくをおぼえて ほしをあつめよう！</div>
  </div>

  <!-- トロフィーエリア -->
  <div class="trophy-area" id="trophy-area"></div>

  <!-- 九九カードグリッド -->
  <div class="dan-grid" id="dan-grid"></div>

  <!-- フッター -->
  <div class="home-footer">
    <button class="btn-reset" onclick="resetProgress()" aria-label="記録をリセット">
      🗑️ きろくをリセット
    </button>
  </div>
</div>

<!-- ===== 学習画面 ===== -->
<div id="screen-study" class="screen">
  <div id="study-content"></div>
</div>

<!-- ポップ演出オーバーレイ -->
<div class="pop-overlay" id="pop-overlay">
  <div class="pop-overlay-emoji" id="pop-emoji"></div>
  <div class="pop-overlay-text" id="pop-text"></div>
</div>

<script>
/* ============================================================
   九九マスターアプリ
   - 1ファイル完結 / 日本語 / スマホ向け
   - Web Speech API 使用 (非対応時は代替モード)
   - localStorage で進捗保存
============================================================ */

// ===== 定数 =====
const STORAGE_KEY = 'kuku_progress_v1';
const MAX_LEVEL = 5;
const MAX_DAN = 9;

// ===== 段カラーパレット =====
const DAN_COLORS = [

const KUKU_DATA = (() => {

        'ハちろくしじゅうハち','ハちしちごじゅうろく','ハっぱろくじゅうし','はっくななじゅうに'],

  // 答えの正解候補マップ

    32: ['32','３２','さんじゅうに'],
    35: ['35','３５','さんじゅうご'],
    36: ['36','３６','さんじゅうろく'],
    40: ['40','４０','よんじゅう'],
    42: ['42','４２','よんじゅうに'],
    45: ['45','４５','よんじゅうご'],
    48: ['48','４８','よんじゅうはち'],
    49: ['49','４９','よんじゅうきゅう','よんじゅうく'],
    54: ['54','５４','ごじゅうし','ごじゅうよん'],
    56: ['56','５６','ごじゅうろく'],
    60: ['60','６０','ろくじゅう'],
    63: ['63','６３','ろくじゅうさん'],
    64: ['64','６４','ろくじゅうし','ろくじゅうよん'],
    70: ['70','７０','ななじゅう','しちじゅう'],
    72: ['72','７２','ななじゅうに','しちじゅうに'],
    80: ['80','８０','はちじゅう'],
    81: ['81','８１','はちじゅういち']
  };
  // 全問データ生成
  const data = {};
  for (let dan = 1; dan <= 9; dan++) {
    data[dan] = [];
    for (let i = 0; i < 9; i++) {
      const mul = i + 1;
      const ans = dan * mul;
      const candidates = ANSWER_MAP[ans] || [String(ans)];
      const ansYomi = (candidates.find(c => /^[ぁ-ん]+$/.test(c)) || String(ans)).replace(/は/g, 'ハ');
      data[dan].push({
        dan, mul, ans,
        formula: `${dan} × ${mul}`,
        fullYomi: FULL_YOMI[dan][i],
        halfYomi: HALF_YOMI[dan][i],
        answerCandidates: candidates,
        ansYomi
      });
    }
  }
  return data;
})();

// ===== 音声合成 =====
let ttsSupported = (typeof speechSynthesis !== 'undefined');

function speak(text, onEnd, onError, pitch = 1.1) {
  if (!ttsSupported) { if(onEnd) onEnd(); return; }
  try {
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ja-JP';
    utter.rate = 0.82;
    utter.pitch = pitch;
    utter.volume = 1.0;
    // 日本語音声を探す
    const voices = speechSynthesis.getVoices();
    const jaVoice = voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) utter.voice = jaVoice;
    utter.onend = () => { if(onEnd) onEnd(); };
    utter.onerror = (e) => { console.warn('TTS error', e); if(onError) onError(e); else if(onEnd) onEnd(); };
    speechSynthesis.speak(utter);
  } catch(e) {
    console.warn('speak error', e);
    if(onError) onError(e); else if(onEnd) onEnd();
  }
}

// iOS Safari での沈黙バグ対策
function ensureVoicesLoaded(cb) {
  const voices = speechSynthesis.getVoices();
  if (voices.length > 0) { cb(); return; }
  let called = false;
  const once = () => { if (called) return; called = true; cb(); };
  speechSynthesis.addEventListener('voiceschanged', once, { once: true });
  setTimeout(once, 800); // fallback
}

// ===== 音声認識 =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let speechSupported = !!SpeechRec;
let activeRecognition = null;

function stopRecognition() {
  if (activeRecognition) {
    try { activeRecognition.stop(); } catch(e) {}
    activeRecognition = null;
  }
}

function startRecognition(onResult, onError, onNoMatch) {
  if (!speechSupported) { if(onNoMatch) onNoMatch('unsupported'); return; }
  stopRecognition();
  try {
    const rec = new SpeechRec();
    rec.lang = 'ja-JP';
    rec.continuous = false;
    rec.interimResults = false;
    rec.maxAlternatives = 5;
    activeRecognition = rec;
    let handled = false;
    rec.onresult = (e) => {
      if (handled) return;
      handled = true;
      activeRecognition = null;
      const results = [];
      for (let i = 0; i < e.results[0].length; i++) {
        results.push(e.results[0][i].transcript.trim());
      }
      onResult(results);
    };
    rec.onerror = (e) => {
      if (handled) return;
      handled = true;
      activeRecognition = null;
      console.warn('SpeechRec error:', e.error);
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        speechSupported = false;
        onError('permission');
      } else if (e.error === 'no-speech' || e.error === 'aborted') {
        if(onNoMatch) onNoMatch('no-speech');
      } else {
        if(onError) onError(e.error);
      }
    };
    rec.onnomatch = () => {
      if (handled) return;
      handled = true;
      activeRecognition = null;
      if(onNoMatch) onNoMatch('no-match');
    };
    rec.start();
  } catch(e) {
    activeRecognition = null;
    console.warn('SpeechRec start error', e);
    if(onError) onError('start-error');
  }
}

/* ============================================================
   答え判定
============================================================ */
function normalizeText(s) {
  return s.replace(/[\s　。、！？!?,.]/g, '').toLowerCase()
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
}

// 漢字数字文字列を整数に変換（例: "六十三" → 63）
function kanjiToNum(s) {
  const d = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
  let result = 0, cur = 0;
  for (const c of s) {
    if (d[c] !== undefined) { cur = d[c]; }
    else if (c === '十') { result += (cur || 1) * 10; cur = 0; }
    else if (c === '百') { result += (cur || 1) * 100; cur = 0; }
    else return NaN;
  }
  return result + cur;
}

function judgeAnswer(recognizedList, answerCandidates, expectedNum) {
  for (const raw of recognizedList) {
    const norm = normalizeText(raw);
    // アラビア数字として一致
    const asNum = parseInt(norm, 10);
    if (!isNaN(asNum) && asNum === expectedNum) return true;
    // 漢字数字として一致
    const fromKanji = kanjiToNum(raw.trim());
    if (!isNaN(fromKanji) && fromKanji === expectedNum) return true;
    // ひらがな候補と一致
    for (const cand of answerCandidates) {
      const nc = normalizeText(cand);
      if (norm === nc) return true;
      if (norm.includes(nc) || nc.includes(norm)) return true;
    }
  }
  return false;
}

// ===== レベル開始 =====
function startLevel(level) {
  const dan = gameState.dan;
  const unlockLevel = getUnlockLevel(dan);
  if (level > unlockLevel) {
    showPopup('🔒', `まず レベル${level-1}を クリアしよう！`);
    return;
  }

  gameState.level = level;
  gameState.qIndex = 0;
  gameState.correctCount = 0;
  gameState.state = 'idle';
  gameState.lastJudge = null;
  gameState.altMode = !speechSupported;

  // 問題配列生成
  const base = KUKU_DATA[dan].slice(); // 9問コピー
  if (level === 3) {
    // 逆順
    gameState.questions = base.slice().reverse();
  } else if (level === 4 || level === 5) {
    // ランダム
    gameState.questions = shuffleArray(base);
  } else {
    // 順番
    gameState.questions = base;
  }

  renderGameScreen();
  // スタートボタンなし: 画面描画後すぐに自動スタート
  setTimeout(() => handleStart(), 200);
}

// ===== 配列シャッフル =====
function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== 代替モード用選択肢生成 =====
function generateChoices(correctAns, dan, level) {
  const allAnswers = new Set();
  for (let d = 1; d <= MAX_DAN; d++) {
    KUKU_DATA[d].forEach(q => allAnswers.add(q.ans));
  }
  const others = [...allAnswers].filter(a => a !== correctAns);
  // ランダムに3つ選ぶ
  const chosen = [];
  const pool = shuffleArray(others);
  for (let i = 0; i < 3 && i < pool.length; i++) chosen.push(pool[i]);
  // 4択 (正解含む)
  const choices = shuffleArray([correctAns, ...chosen.slice(0, 3)]);
  return choices;
}

/* ============================================================
   ゲーム進行制御
============================================================ */

// ===== スタートボタン処理 =====
function handleStart() {
  const { level, qIndex, questions, altMode } = gameState;
  const q = questions[qIndex];
  gameState.state = 'speaking';
  setStatus('きいてね 🎵');
  setBtnArea('');
  setRecResult('', '');
  setJudgeIcon('');

  if (altMode) {
    // 代替モード: 音声再生のみ (認識なし)
    if (ttsSupported) {
      const yomi = (level === 1) ? q.fullYomi : q.halfYomi;
      setReadingDisplay(yomi);
      speak(yomi, () => {
        gameState.state = 'waitingAnswer';
        afterSpeak();
      }, () => {
        gameState.state = 'waitingAnswer';
        afterSpeak();
      });
    } else {
      setReadingDisplay((level === 1) ? q.fullYomi : q.halfYomi);
      gameState.state = 'waitingAnswer';
      afterSpeak();
    }
    return;
  }

  // 音声あり
  ensureVoicesLoaded(() => {
    const yomi = (level === 1) ? q.fullYomi : q.halfYomi;
    setReadingDisplay(yomi);
    speak(yomi, () => {
      gameState.state = 'waitingAnswer';
      afterSpeak();
    }, (err) => {
      setStatus('⚠ おとがでなかったよ。もういちど！');
      setBtnArea(`<button class="btn-primary" onclick="handleStart()" aria-label="もういちど">🔄 もういちど</button>`);
    });
  });
}

function afterSpeak() {
  const { level, altMode } = gameState;

  if (level === 1) {
    setStatus('おなじように いってみよう！ 🗣');
  } else {
    setStatus('こたえを いってね！ 🗣');
  }

  if (altMode) {
    // 代替モードは buttons でハンドル済み
    return;
  }

  // TTS残響対策: 0.5秒後に認識開始
  gameState.state = 'recognizing';
  setTimeout(() => {
    if (gameState.state !== 'recognizing') return;
    setStatus('<span class="rec-animation"><span class="rec-dot"></span><span class="rec-dot"></span><span class="rec-dot"></span></span> にんしきちゅう…');
    startRecognition(
      (results) => handleRecognitionResult(results),
      (errType) => handleRecognitionError(errType),
      (type) => handleRecognitionNoMatch(type)
    );
    // 5秒待って認識されなければ no-speech 扱い
    setTimeout(() => {
      if (gameState.state !== 'recognizing') return;
      stopRecognition();
      handleRecognitionNoMatch('no-speech');
    }, 5000);
  }, 500);
}

// ===== 音声認識結果処理 =====
function handleRecognitionResult(results) {
  gameState.state = 'judged';
  const { level, questions, qIndex } = gameState;
  const q = questions[qIndex];

  if (level === 1) {
    // レベル1: 何か発声されればOK（表示なし）
    const said = results.join('').trim();
    if (said.length > 0) {
      onCorrect();
    } else {
      onNoSpeech();
    }
  } else {
    const correct = judgeAnswer(results, q.answerCandidates, q.ans);
    if (correct) {
      setRecResult(`${q.ans} ✓`, 'correct');
      onCorrect();
    } else {
      setRecResult(`${q.ans} ✗`, 'wrong');
      onWrong();
    }
  }
}

function handleRecognitionError(errType) {
  gameState.state = 'idle';
  if (errType === 'permission') {
    speechSupported = false;
    gameState.altMode = true;
    setStatus('⚠ マイクを使えません。ボタンモードにきりかえます。');
    setTimeout(() => { startLevel(gameState.level); }, 1500);
  } else {
    setStatus('⚠ エラー。もういちど！');
    setTimeout(() => handleStart(), 1000);
  }
}

function handleRecognitionNoMatch(type) {
  gameState.state = 'idle';
  setStatus('きこえなかったよ… もういちど 🎤');
  setRecResult('', '');
  setTimeout(() => handleStart(), 800);
}

function onNoSpeech() {
  gameState.state = 'idle';
  setStatus('きこえなかったよ… もういちど！');
  setRecResult('', '');
  setTimeout(() => handleStart(), 800);
}

// ===== 代替モード処理 =====
function handleAltLv1() {
  gameState.state = 'judged';
  setRecResult('👂 きいたよ！', 'correct');
  onCorrect();
}

function handleAltChoice(chosen) {
  if (gameState.state === 'judged') return;
  const { questions, qIndex } = gameState;
  const q = questions[qIndex];
  gameState.state = 'judged';
  const correct = (chosen === q.ans);
  // ボタン色変更
  const btns = document.querySelectorAll('.btn-choice');
  btns.forEach(b => {
    const val = parseInt(b.textContent);
    if (val === q.ans) b.classList.add('correct-choice');
    else if (val === chosen && !correct) b.classList.add('wrong-choice');
    b.onclick = null;
  });
  if (correct) {
    setRecResult(`${chosen} ✓ せいかい！`, 'correct');
    onCorrect();
  } else {
    setRecResult(`${chosen} ✗ こたえは ${q.ans}`, 'wrong');
    onWrong();
  }
}

/* ============================================================
   正誤処理
============================================================ */
function onCorrect() {
  gameState.correctCount++;
  setJudgeIcon('⭕');
  setStatus('せいかい！ すごい！ 🎉');
  showPopup('⭕', 'せいかい！', 800);
  speak('せいかい', () => {
    setTimeout(() => goNextQuestion(), 1300);
  }, () => {
    setTimeout(() => goNextQuestion(), 1300);
  }, 0.5);
}

function onWrong() {
  const { level, questions, qIndex } = gameState;
  const q = questions[qIndex];
  const correctYomi = q.ansYomi;

  if (level === 5) {
    // レベル5: 即失敗
    gameState.state = 'levelFail';
    setJudgeIcon('❌');
    setStatus(`しっぱい！ もういちど チャレンジ！`);
    speak('ざんねん', null, null);
    setTimeout(() => renderLevelFail(), 1200);
    return;
  }

  setJudgeIcon('❌');
  setStatus(`ざんねん… こたえは「${q.ans}」だよ`);
  speak(`こたえは${correctYomi}`, () => {
    setTimeout(() => goNextQuestion(), 2300);
  }, () => {
    setTimeout(() => goNextQuestion(), 2300);
  });
}

// ===== 次の問題へ =====
function goNextQuestion() {
  gameState.qIndex++;
  const { qIndex, questions, level, correctCount } = gameState;
  if (qIndex >= questions.length) {
    // 全問終了
    judgeLevel();
    return;
  }
  gameState.state = 'idle';
  // 画面更新
  renderNextQuestion();
}

function renderNextQuestion() {
  const { dan, level, qIndex, questions, correctCount, altMode } = gameState;
  const total = questions.length;
  const q = questions[qIndex];
  const color = DAN_COLORS[dan - 1];
  const pct = Math.round((qIndex / total) * 100);
  const showAns = (level === 1);
  const formulaHtml = showAns
    ? `${q.formula} = <span style="color:${color}">${q.ans}</span>`
    : `${q.formula} = <span style="color:#ccc">?</span>`;

  // 進捗バー更新
  const fill = document.getElementById('prog-fill');
  if (fill) fill.style.width = pct + '%';

  // 問題情報更新
  const qf = document.getElementById('q-formula');
  if (qf) qf.innerHTML = formulaHtml;

  const qr = document.getElementById('q-reading');
  if (qr) qr.textContent = '';

  // カウント更新
  const pi = document.querySelector('.progress-info');
  if (pi) pi.innerHTML = `<span>もんだい ${qIndex + 1} / ${total}</span><span>せいかい ${correctCount}</span>`;

  setStatus('');
  setRecResult('', '');
  setJudgeIcon('');

  // 代替モードのボタン再生成
  if (altMode && level > 1) {
    const choices = generateChoices(q.ans, dan, level);
    const altArea = document.getElementById('alt-choices');
    if (altArea) {
      altArea.innerHTML = choices.map(c =>
        `<button class="btn-choice" onclick="handleAltChoice(${c})" aria-label="${c}">${c}</button>`
      ).join('');
    }
  }

  setBtnArea('');
  // 次の問題も自動スタート
  setTimeout(() => handleStart(), 300);
}

/* ============================================================
   レベル終了判定
============================================================ */
function judgeLevel() {
  const { dan, level, correctCount, questions } = gameState;
  const total = questions.length;

  if (level === 1) {
    // レベル1: 全問完了でクリア
    renderLevelClear();
  } else if (level <= 4) {
    // レベル2〜4: 7問以上正解
    if (correctCount >= PASS_COUNT) {
      renderLevelClear();
    } else {
      renderLevelFail();
    }
  } else {
    // レベル5: ここに来たらノーミスクリア
    renderLevelClear();
  }
}

// ===== レベルクリア処理 =====
function renderLevelClear() {
  const { dan, level, correctCount, questions } = gameState;
  const total = questions.length;
  gameState.state = 'levelClear';

  // 進捗更新
  const dp = getDanProgress(dan);
  const prevMaxClear = dp.maxClear;
  if (level > prevMaxClear) {
    dp.maxClear = level;
    progress[`dan${dan}`] = dp;
    saveProgress();
  }

  const newStars = getDanProgress(dan).maxClear;
  const starGained = newStars > prevMaxClear;

  let msg = '';
  if (level === 1) {
    msg = `レベル2が あたらしく あそべるよ！`;
  } else if (level < MAX_LEVEL) {
    msg = `レベル${level + 1}が あたらしく あそべるよ！`;
  } else {
    msg = `この段を かんぜんマスター！ かんぺき！`;
  }

  const emoji = level === 5 ? '🏆' : '🌟';

  stopRecognition();
  if (ttsSupported) { try { speechSynthesis.cancel(); } catch(e) {} }
  speak('やったー クリア', null, null);

  const content = document.getElementById('study-content');
  const color = DAN_COLORS[dan - 1];
  content.innerHTML = `
    <div class="study-header">
      <button class="btn-back" onclick="openStudy(${dan})" aria-label="もどる">←</button>
      <div class="study-title-area">
        <div class="study-dan-title" style="color:${color}">${dan}のだん レベル${level}</div>
      </div>
    </div>
    <div class="result-area">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title success">クリア！</div>
      ${level > 1 ? `<div class="result-score">せいかい ${correctCount} / ${total}</div>` : ''}
      <div class="result-stars">${renderStars(newStars)}</div>
      ${starGained ? `<div style="font-size:.9rem;color:#f06292;font-weight:700">⭐ ほしが ${newStars}つになったよ！</div>` : ''}
      <div class="result-msg">${msg}</div>
      <div class="btn-group">
        ${level < MAX_LEVEL ? `<button class="btn-primary" onclick="startLevel(${level + 1})" aria-label="レベル${level+1}へ">▶ レベル${level + 1}へ</button>` : ''}
        <button class="btn-secondary" onclick="openStudy(${dan})" aria-label="レベルせんたくへ">📋 レベルせんたくへ</button>
        <button class="btn-tertiary" onclick="goHome()" aria-label="トップへもどる">🏠 トップへもどる</button>
      </div>
    </div>
  `;

  if (starGained) showPopup('⭐', `ほし ${newStars}つ！`, 2000);
}

// ===== レベル失敗処理 =====
function renderLevelFail() {
  const { dan, level, correctCount, questions } = gameState;
  const total = questions.length;
  gameState.state = 'levelFail';

  stopRecognition();
  if (ttsSupported) { try { speechSynthesis.cancel(); } catch(e) {} }

  const color = DAN_COLORS[dan - 1];
  const isLv5 = (level === 5);
  const titleText = isLv5 ? 'しっぱい！ もういちど チャレンジ！' : 'もういちど やってみよう！';
  const emoji = isLv5 ? '😅' : '💪';
  const minMsg = isLv5 ? 'ノーミスで クリアしよう！' : `${PASS_COUNT}もん いじょう せいかいで クリア！`;

  const content = document.getElementById('study-content');
  content.innerHTML = `
    <div class="study-header">
      <button class="btn-back" onclick="openStudy(${dan})" aria-label="もどる">←</button>
      <div class="study-title-area">
        <div class="study-dan-title" style="color:${color}">${dan}のだん レベル${level}</div>
      </div>
    </div>
    <div class="result-area">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title fail">${titleText}</div>
      ${level > 1 ? `<div class="result-score">せいかい ${correctCount} / ${total}</div>` : ''}
      <div class="result-msg">${minMsg}</div>
      <div class="btn-group">
        <button class="btn-primary" onclick="startLevel(${level})" aria-label="もういちど">🔄 もういちど</button>
        <button class="btn-secondary" onclick="openStudy(${dan})" aria-label="レベルせんたくへ">📋 レベルせんたくへ</button>
        <button class="btn-tertiary" onclick="goHome()" aria-label="トップへもどる">🏠 トップへもどる</button>
      </div>
    </div>
  `;
}

// ===== ゲーム中に戻るボタン押した時 =====
function confirmBackFromGame() {
  stopRecognition();
  if (ttsSupported) { try { speechSynthesis.cancel(); } catch(e) {} }
  openStudy(gameState.dan);
}

/* ============================================================
   UI ヘルパー
============================================================ */
function setStatus(html) {
  const el = document.getElementById('status-msg');
  if (el) el.innerHTML = html;
}
function setRecResult(text, cls) {
  const el = document.getElementById('rec-result');
  if (!el) return;
  el.textContent = text || '　';
  el.className = 'recognition-result' + (cls ? ` ${cls}` : '');
}
function setJudgeIcon(text) {
  const el = document.getElementById('judge-icon');
  if (el) el.textContent = text;
}
function setBtnArea(html) {
  const el = document.getElementById('btn-area');
  if (el) el.innerHTML = html;
}
function setReadingDisplay(text) {
  const el = document.getElementById('q-reading');
  if (el) el.textContent = text;
}

/* ============================================================
   初期化
============================================================ */
function init() {
  loadProgress();
  renderHome();
  // voiceschanged をトリガーしておく (iOS対策)
  if (ttsSupported) {
    try { speechSynthesis.getVoices(); } catch(e) {}
  }
}

// DOMContentLoaded後に初期化
document.addEventListener('DOMContentLoaded', init);
</script>
